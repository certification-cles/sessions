<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLES — Calendrier des sessions</title>
<style>
  :root {
    --encre:   #27348B;
    --encre-d: #1F2B76;
    --profond: #18224F;
    --fond:    #F1F4FB;
    --ligne:   #E5E9F4;
    --ligne2:  #EDF0F8;
    --sourd:   #6C7591;
    --blanc:   #FFFFFF;
    --b1: #1899D6;
    --b2: #ED6B1C;
    --c1: #903189;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Verdana, Arial, sans-serif;
    background: var(--fond); color: var(--profond);
    line-height: 1.6; -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1060px; margin: 0 auto; padding: 0 28px; }
  .hero {
    background: linear-gradient(165deg, #2E3CA0 0%, #27348B 55%, #1F2B76 100%);
    color: #fff; padding: 64px 0 96px;
    border-radius: 0 0 50% 50% / 0 0 36px 36px;
  }
  .hero h1 { font-size: 40px; font-weight: 700; letter-spacing: -0.6px; line-height: 1.1; }
  .spectrum-rule {
    width: 128px; height: 4px; border-radius: 2px; margin: 20px 0 0;
    background: linear-gradient(90deg, #1899D6, #80BA27, #FBE200, #ED6B1C, #E81F76, #903189);
  }
  .hero p.sub { font-size: 15px; opacity: 0.9; margin-top: 20px; max-width: 540px; line-height: 1.6; }
  .filters {
    background: var(--blanc); border-radius: 14px;
    box-shadow: 0 18px 40px -20px rgba(24,34,79,.45), 0 2px 8px rgba(24,34,79,.06);
    padding: 18px; margin-top: -56px; position: relative; z-index: 2;
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px;
  }
  .field { position: relative; }
  .field select {
    width: 100%; font-family: inherit; font-size: 14px; color: var(--profond);
    background: #fff; border: 1.5px solid var(--ligne); border-radius: 9px;
    padding: 12px 14px; cursor: pointer; appearance: none; -webkit-appearance: none;
  }
  .field select:focus { outline: none; border-color: var(--encre); box-shadow: 0 0 0 3px rgba(39,52,139,.10); }
  .field.select::after {
    content: ""; position: absolute; right: 14px; top: 50%; margin-top: -4px;
    width: 8px; height: 8px; border-right: 2px solid var(--encre);
    border-bottom: 2px solid var(--encre); transform: rotate(45deg); pointer-events: none;
  }
  .meta-line {
    display: flex; justify-content: space-between; align-items: baseline;
    flex-wrap: wrap; gap: 10px; padding: 30px 4px 0;
  }
  .count { font-size: 14px; color: var(--sourd); }
  .count b { color: var(--encre); font-weight: 700; font-size: 16px; }
  .reset {
    font-size: 12.5px; color: var(--sourd); background: none; border: none; cursor: pointer;
    font-family: inherit; border-bottom: 1px solid transparent; padding-bottom: 1px;
  }
  .reset:hover { color: var(--encre); border-bottom-color: var(--encre); }
  #liste { margin-top: 8px; }
  .list-fade { opacity: 0; animation: fade .45s ease forwards; }
  @keyframes fade { to { opacity: 1; } }
  .month { margin-top: 38px; }
  .month-label {
    display: flex; align-items: center; gap: 14px; margin-bottom: 16px;
    font-size: 13px; font-weight: 700; color: var(--encre);
    text-transform: uppercase; letter-spacing: 1.6px;
  }
  .month-label::after { content: ""; flex: 1; height: 2px; border-radius: 2px; background: var(--ligne); }
  .month-label .nb {
    font-weight: 600; font-size: 11px; color: var(--encre);
    background: #E4E9F8; border-radius: 999px; padding: 3px 11px;
    letter-spacing: .3px; text-transform: none;
  }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; }
  .card {
    background: var(--blanc); border-radius: 13px; overflow: hidden;
    box-shadow: 0 4px 14px -8px rgba(24,34,79,.18);
    display: flex; flex-direction: column;
    transition: transform .2s ease, box-shadow .2s ease;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 18px 36px -16px rgba(24,34,79,.38); }
  .card .accent { height: 4px; background: var(--c, var(--encre)); }
  .card .body { padding: 20px 22px 18px; display: flex; flex-direction: column; gap: 13px; flex: 1; }
  .card .top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .card .date { line-height: 1; }
  .card .date .n { font-size: 34px; font-weight: 700; color: var(--encre); letter-spacing: -1px; }
  .card .date .mo { display: block; font-size: 11px; color: var(--sourd); text-transform: uppercase; letter-spacing: 1.3px; margin-top: 5px; font-weight: 600; }
  .badge { font-size: 11.5px; font-weight: 700; letter-spacing: .4px; color: #fff; background: var(--c, var(--encre)); border-radius: 6px; padding: 4px 10px; white-space: nowrap; }
  .card .lang { font-size: 17px; font-weight: 700; color: var(--profond); letter-spacing: -.2px; }
  .card .place { font-size: 13.5px; color: var(--profond); }
  .card .place small { display: block; color: var(--sourd); font-size: 12.5px; margin-top: 2px; }
  .card .insc { font-size: 12.5px; color: var(--sourd); line-height: 1.55; border-top: 1px solid var(--ligne2); padding-top: 13px; }
  .card .insc b { color: var(--profond); font-weight: 700; }
  .statut {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 700; letter-spacing: .3px;
    border-radius: 999px; padding: 3px 10px; margin-bottom: 6px;
  }
  .statut::before { content:""; width:6px; height:6px; border-radius:50%; flex:none; background:currentColor; }
  .statut.ouvertes { color:#1a7a3c; background:#e6f5ec; }
  .statut.avenir   { color:#5a5f7a; background:#ECEEF5; }
  .statut.closes   { color:#9e3a0a; background:#fdeee6; }
  .card .foot { margin-top: auto; padding-top: 4px; display: flex; gap: 8px; align-items: stretch; }
  .card .foot a {
    flex: 1; text-align: center; font-size: 12.5px; font-weight: 700;
    text-decoration: none; border-radius: 999px; padding: 8px 12px;
    transition: all .16s ease; white-space: nowrap;
  }
  .card a.more { color: #fff; background: var(--encre); border: 1.5px solid var(--encre); }
  .card a.more:hover { background: #1F2B76; border-color: #1F2B76; }
  .card a.mail { color: var(--encre); background: #fff; border: 1.5px solid var(--encre); }
  .card a.mail:hover { background: var(--encre); color: #fff; }
  .card .nolink { flex: 1; text-align: center; font-size: 12px; color: #AEB6CF; padding: 8px 12px; }
  .loadmore {
    display: block; margin: 40px auto 0; font-family: inherit;
    font-size: 13.5px; font-weight: 700; color: #fff; letter-spacing: .3px;
    background: var(--encre); border: none; border-radius: 999px;
    padding: 13px 34px; cursor: pointer; transition: background .18s ease;
    box-shadow: 0 10px 24px -12px rgba(39,52,139,.6);
  }
  .loadmore:hover { background: #1F2B76; }
  .empty, .loading { padding: 64px 0; text-align: center; color: var(--sourd); font-size: 14px; line-height: 1.7; }
  .empty strong { color: var(--encre); font-weight: 700; }
  .spinner {
    width: 32px; height: 32px; margin: 0 auto 18px; border-radius: 50%;
    border: 3px solid var(--ligne); border-top-color: var(--encre);
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  footer {
    margin-top: 56px; padding: 26px 0 44px; border-top: 1px solid var(--ligne);
    font-size: 11.5px; color: var(--sourd);
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }
  @media (max-width: 860px) { .filters { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 600px) { .hero { padding: 48px 0 84px; } .hero h1 { font-size: 28px; } .grid { grid-template-columns: 1fr; } }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } .list-fade { opacity: 1; } .card:hover { transform: none; } .spinner { animation: spin 1.2s linear infinite; } }
</style>
</head>
<body>

<div class="hero">
  <div class="wrap">
    <h1>Calendrier des sessions CLES</h1>
    <div class="spectrum-rule" aria-hidden="true"></div>
    <p class="sub">Trouvez une session près de chez vous. Les dates sont déclarées par les centres d'examen et mises à jour automatiquement.</p>
  </div>
</div>

<div class="wrap">
  <div class="filters" role="search">
    <div class="field select">
      <select id="f-langue" aria-label="Langue"><option value="">Toutes les langues</option></select>
    </div>
    <div class="field select">
      <select id="f-niveau" aria-label="Niveau">
        <option value="">Tous les niveaux</option>
        <option>B1</option><option>B2</option><option>C1</option>
      </select>
    </div>
    <div class="field select">
      <select id="f-ville" aria-label="Centre"><option value="">Tous les centres</option></select>
    </div>
    <div class="field select">
      <select id="f-mois" aria-label="Mois"><option value="">Tous les mois</option></select>
    </div>
  </div>

  <div class="meta-line">
    <span class="count" id="count"></span>
    <button class="reset" id="reset">Réinitialiser les filtres</button>
  </div>

  <div id="liste">
    <div class="loading"><div class="spinner"></div>Chargement des sessions…</div>
  </div>
  <button class="loadmore" id="loadmore" hidden>Afficher plus de sessions</button>

  <footer>
    <span>Données issues des déclarations des centres CLES — www.certification-cles.fr</span>
    <span id="maj"></span>
  </footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
/* ============================================================
   Source : sessions.csv (même dépôt), mis à jour chaque jour par Make
   depuis le rapport Moodle. La page parse et nettoie le CSV au chargement.
   ============================================================ */
const CSV_URL = "sessions.csv";
const LVL_COLOR = {"B1":"#1899D6","B2":"#ED6B1C","C1":"#903189"};
const MOIS = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
const MOIS_AB = ["janv.","févr.","mars","avr.","mai","juin","juil.","août","sept.","oct.","nov.","déc."];
const PAGE = 48;
let shown = PAGE;
let sessions = [];

const MINUSCULES = ["de","du","des","d","et","en","la","le","les","l","au","aux","sur","à"];
function titleCase(str){
  if(!str) return "";
  return str.toLowerCase().split(/\s+/).map((w,i)=>{
    if(i>0 && MINUSCULES.includes(w.replace(/['']/g,""))) return w;
    return w.charAt(0).toUpperCase()+w.slice(1);
  }).join(" ")
   .replace(/\bCote\b/g,"Côte").replace(/\bLumiere\b/g,"Lumière")
   .replace(/D'opale/gi,"d'Opale").replace(/\(ulco\)/i,"(ULCO)").replace(/\(ubo\)/i,"(UBO)")
   .replace(/\bUniversite\b/g,"Université");
}

function isURL(s){ return s && s.trim().toLowerCase().startsWith("http"); }
function isEmail(s){ return s && s.includes("@") && !isURL(s); }

function toISO(d){
  const m = (d||"").trim().match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  return m ? `${m[3]}-${m[2]}-${m[1]}` : "";
}

// Période d'inscription manifestement erronée (même jour début=fin) → on neutralise
function inscValide(insc){
  const m = (insc||"").match(/(\d{2}\/\d{2}\/\d{4}) au (\d{2}\/\d{2}\/\d{4})/);
  if(!m) return false;
  return m[1] !== m[2];
}

function statutInsc(insc){
  const m = (insc||"").match(/(\d{2})\/(\d{2})\/(\d{4}) au (\d{2})\/(\d{2})\/(\d{4})/);
  if(!m) return { cls:"avenir", label:"Sur demande" };
  const today = new Date(); today.setHours(0,0,0,0);
  const debut = new Date(+m[3], +m[2]-1, +m[1]);
  const fin   = new Date(+m[6], +m[5]-1, +m[4]); fin.setHours(23,59,59);
  if(today < debut) return { cls:"avenir",   label:"Inscriptions à venir" };
  if(today > fin)   return { cls:"closes",   label:"Inscriptions closes"  };
  return                { cls:"ouvertes", label:"Inscriptions ouvertes" };
}

function nettoyer(rows){
  const today = new Date(); today.setHours(0,0,0,0);
  const vus = new Set();
  const out = [];
  rows.forEach(r=>{
    const ln = (r["langue et niveau"]||"").trim();
    let langue = ln, niveau = "";
    if(ln.includes(" - ")){ const p = ln.split(" - "); langue = p[0].trim(); niveau = p[1].trim(); }

    const iso = toISO(r["date de session"]);
    if(!iso || !langue) return;

    // Masquer les sessions passées
    const dSession = new Date(iso + "T12:00:00");
    if(dSession < today) return;

    const univ = titleCase((r["université organisatrice"]||"").trim());

    const siteRaw = (r["site d'information"]||"").trim();
    const contactRaw = (r["contact"]||"").trim();
    let url = isURL(siteRaw) ? siteRaw : (isURL(contactRaw) ? contactRaw : "");
    let mail = isEmail(contactRaw) ? contactRaw.split(/[;,]/)[0].trim()
             : (isEmail(siteRaw) ? siteRaw.split(/[;,]/)[0].trim() : "");

    const inscRaw = (r["dates d'inscription"]||"").trim();
    const insc = inscValide(inscRaw) ? inscRaw : "";

    // Déduplication
    const cle = [langue,niveau,iso,univ].join("|");
    if(vus.has(cle)) return;
    vus.add(cle);

    out.push({ langue, niveau, d: iso, insc, univ, url, contact: mail });
  });
  out.sort((a,b)=> a.d < b.d ? -1 : a.d > b.d ? 1 : 0);
  return out;
}

function peuplerFiltres(){
  const selL = document.getElementById("f-langue");
  const selV = document.getElementById("f-ville");
  const selM = document.getElementById("f-mois");
  [...new Set(sessions.map(s=>s.langue))].sort((a,b)=>a.localeCompare(b,"fr"))
    .forEach(l=> selL.insertAdjacentHTML("beforeend",`<option>${l}</option>`));
  [...new Set(sessions.map(s=>s.univ))].sort((a,b)=>a.localeCompare(b,"fr"))
    .forEach(v=> selV.insertAdjacentHTML("beforeend",`<option value="${v.replace(/"/g,'&quot;')}">${v}</option>`));
  [...new Set(sessions.map(s=>s.d.slice(0,7)))].sort()
    .forEach(m=>{ const[y,mm]=m.split("-"); selM.insertAdjacentHTML("beforeend",`<option value="${m}">${MOIS[+mm-1]} ${y}</option>`); });
}

function filtered(){
  const l=document.getElementById("f-langue").value;
  const n=document.getElementById("f-niveau").value;
  const v=document.getElementById("f-ville").value;
  const m=document.getElementById("f-mois").value;
  return sessions.filter(s=>
    (!l||s.langue===l)&&(!n||s.niveau===n)&&(!v||s.univ===v)&&(!m||s.d.startsWith(m)));
}

function render(fp){
  const out=filtered();
  document.getElementById("count").innerHTML=`<b>${out.length}</b> session${out.length>1?"s":""} à venir`;
  const liste=document.getElementById("liste");
  if(!out.length){
    liste.innerHTML='<div class="empty"><strong>Aucune session ne correspond à ces critères.</strong><br>De nouvelles sessions sont déclarées régulièrement par les centres d\'examen.</div>';
    document.getElementById("loadmore").hidden=true; return;
  }
  const mc={};
  out.forEach(s=>{const k=s.d.slice(0,7);mc[k]=(mc[k]||0)+1;});
  let html="",cur="";
  out.slice(0,shown).forEach(s=>{
    const dt=new Date(s.d+"T12:00:00"),k=s.d.slice(0,7),col=LVL_COLOR[s.niveau]||"#27348B";
    if(k!==cur){
      if(cur) html+="</div></div>";
      html+=`<div class="month"><div class="month-label">${MOIS[dt.getMonth()]} ${dt.getFullYear()} <span class="nb">${mc[k]} session${mc[k]>1?"s":""}</span></div><div class="grid">`;
      cur=k;
    }
    const st=statutInsc(s.insc);
    const inscTxt = s.insc ? s.insc : "Contacter le centre";
    html+=`<div class="card" style="--c:${col}">
      <div class="accent"></div>
      <div class="body">
        <div class="top">
          <div class="date"><span class="n">${dt.getDate()}</span><span class="mo">${MOIS_AB[dt.getMonth()]}</span></div>
          <span class="badge">${s.niveau||"—"}</span>
        </div>
        <div class="lang">${s.langue}</div>
        <div class="place">${s.univ}</div>
        <div class="insc">
          <span class="statut ${st.cls}">${st.label}</span>
          <br><b>${inscTxt}</b>
        </div>
        <div class="foot">
          ${s.url?`<a class="more" href="${s.url}" target="_blank" rel="noopener">Détails</a>`:""}
          ${s.contact?`<a class="mail" href="mailto:${s.contact}">Contacter</a>`:""}
          ${!s.url&&!s.contact?`<span class="nolink">Contacter le centre</span>`:""}
        </div>
      </div>
    </div>`;
  });
  html+="</div></div>";
  liste.innerHTML=html;
  if(fp) liste.classList.add("list-fade");
  document.getElementById("loadmore").hidden=(shown>=out.length);
}

["f-langue","f-niveau","f-ville","f-mois"].forEach(id=>
  document.getElementById(id).addEventListener("change",()=>{shown=PAGE;render(false);}));
document.getElementById("loadmore").addEventListener("click",()=>{shown+=PAGE;render(false);});
document.getElementById("reset").addEventListener("click",()=>{
  ["f-langue","f-niveau","f-ville","f-mois"].forEach(id=>document.getElementById(id).value="");
  shown=PAGE;render(false);
});

// Chargement du CSV
Papa.parse(CSV_URL, {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(res){
    sessions = nettoyer(res.data);
    peuplerFiltres();
    document.getElementById("maj").textContent =
      "Mis à jour le " + new Date().toLocaleDateString("fr-FR", {day:"numeric", month:"long", year:"numeric"});
    render(true);
  },
  error: function(){
    document.getElementById("liste").innerHTML =
      '<div class="empty"><strong>Impossible de charger les sessions pour le moment.</strong><br>Merci de réessayer dans quelques instants.</div>';
  }
});
</script>
</body>
</html>
